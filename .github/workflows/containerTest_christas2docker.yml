# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - christas2docker

on:
  push:
    branches:
      - containerTest
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to registry
      uses: docker/login-action@v1
      with:
        registry: https://rekryjscloud.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_e6762b0893394a119a1e52ac857d5eb8 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_147869ce929945f68874224f3fe6f0fa }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: rekryjscloud.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_e6762b0893394a119a1e52ac857d5eb8 }}/christas2docker:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'christas2docker'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_0b4639b0990c4188ad4e017ea97d9759 }}
        images: 'rekryjscloud.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_e6762b0893394a119a1e52ac857d5eb8 }}/christas2docker:${{ github.sha }}'