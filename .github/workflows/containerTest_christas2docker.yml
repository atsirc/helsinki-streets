# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - christas2docker

on:
  push:
    branches:
      - containerTest
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to registry
      uses: docker/login-action@v1
      with:
        registry: https://rekryjscloud.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_903031775cae4ab6b27f43da42fcf579 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_d4580ee07fa44663b24e8c268cab6929 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: rekryjscloud.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_903031775cae4ab6b27f43da42fcf579 }}/christas2docker:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'christas2docker'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_1bd2b41312f944cc8ff51cf6e2393891 }}
        images: 'rekryjscloud.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_903031775cae4ab6b27f43da42fcf579 }}/christas2docker:${{ github.sha }}'